# Server Configuration
server.port=8081
server.servlet.context-path=/api

# DISABLE SECURITY COMPLETELY (keep this if you want)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/unicore360_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration for MySQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Disable H2 (since we're using MySQL)
spring.h2.console.enabled=false

# OAuth2 Google Login
spring.security.oauth2.client.registration.google.client-id=403025360820-nurikj0mdhs1relck243iu7o81gmdg5o.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.client-secret=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
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://www.googleapis.com/oauth2/v4/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# Logging
logging.level.com.unicore360=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

